services:
  # ============================================
  # FrankenPHP (web server + PHP runtime)
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mulaicpns_app
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # Bind mount: sync code Mac ↔ container (buat dev)
      - ./:/app
      # Anonymous volume: jangan override vendor/ dari host
      - /app/vendor
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mulaicpns_network

  # ============================================
  # MySQL Database
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: mulaicpns_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: mulaicpns
      MYSQL_USER: mulaicpns
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mulaicpns_network

  # ============================================
  # Redis Cache & Session
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: mulaicpns_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - mulaicpns_network

# ============================================
# Persistent volumes
# ============================================
volumes:
  mysql_data:
  redis_data:

# ============================================
# Internal network
# ============================================
networks:
  mulaicpns_network:
    driver: bridge